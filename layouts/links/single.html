{{ define "title" }}{{ .Title }} · {{ .Site.Title }}{{ end }}
{{ define "content" }}
<section class="container page">
  <article>
    <header>
      <h1 class="title">{{ .Title }}</h1>
    </header>
    {{ with .Params.externalLink }}
    <p><a href="{{ . }}">{{ . }}</a></p>
    {{ end }}
    {{ with .GetTerms "tags" }}
    <p class="link-tags">{{ range . }}<a href="{{ .RelPermalink }}">#{{ .LinkTitle }}</a> {{ end }}</p>
    {{ end }}
  </article>
</section>
{{ end }}
