baseurl = "https://thibmeu.github.io/"
title = "Thibault Meunier"
theme = "hugo-coder"
languagecode = "en"
defaultcontentlanguage = "en"

paginate = 20

[taxonomies]
  tag = "tags"
canonifyurls = true

pygmentsstyle = "monokai"
pygmentscodefences = true
pygmentscodefencesguesssyntax = true

[params]
    author = "Thibault Meunier"
    info = "I talk to computers to make them work"
    description = "Thibault Meunier's personal website"
    keywords = "blog,developer,personal"
    customCSS = ["css/links.css"]

    hidecredits = false
    hidecopyright = true

    colorScheme = "auto"
    hidecolorschemetoggle = false

    math = false

# Social links
[[params.social]]
    name = "Github"
    icon = "fa fa-github fa-2x"
    weight = 1
    url = "https://github.com/thibmeu/"
[[params.social]]
    name = "Bluesky"
    icon = "fa-brands fa-bluesky fa-2x"
    weight = 2
    url = "https://bsky.app/profile/thibmeu.com/"
[[params.social]]
    name = "RSS"
    icon = "fa fa-rss fa-2x"
    weight = 3
    url = "/index.xml"

# Menu links
[[menu.main]]
    name = "Blog"
    weight = 1
    url  = "posts/"

[[menu.main]]
    name = "Projects"
    weight = 2
    url  = "projects/"

[[menu.main]]
    name = "Work"
    weight = 3
    url  = "work/"

[[menu.main]]
    name = "Links"
    weight = 4
    url  = "links/"
